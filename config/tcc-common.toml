
#TACZ Curios 饰品配置
[tcc_curios]

	#天火圣裁饰品配置
	[tcc_curios.heaven_fire_judgment]
		#通用枪械伤害加成 (默认: 3.25 = 325%)
		#Range: -1.0 ~ 100.0
		damageBoost = 3.25
		#触发时扣除的当前生命值比例 (默认: -0.3 = -30%)
		#Range: -1.0 ~ 1.0
		healthCost = -0.3
		#伤害降低99%，并转换为虚数伤害
		#Range: 0.0 ~ 1.0
		damageConversionRatio = 0.01
		#天火圣裁生效的枪械类型列表 (可选: pistol, rifle, shotgun, sniper, smg, mg, rpg)
		gunTypes = ["pistol"]

	#天火流血效果配置（两个饰品共用）
	[tcc_curios.heaven_fire_bleeding]
		#每级流血效果造成的最大生命值比例伤害 (默认: -0.1 = -10% maxHP/级)
		#Range: -1.0 ~ 0.0
		damagePerLevel = -0.1
		#流血效果最大等级 (默认: 5)
		#Range: 1 ~ 10
		maxLevel = 5
		#流血效果持续时间(秒) (默认: 5)
		#Range: 1 ~ 60
		duration = 5
		#天火劫灭扣血后延迟施加流血的时长(秒) (默认: 3, 最小: 1)
		#Range: 1 ~ 60
		delayDuration = 3

	#虚数侵染效果配置（纯标记，不再直接造成流血。流血由虚数崩解处理。增伤计算公式：最终伤害 = 伤害 × (1 + 层数 × ampPerLevel)）
	[tcc_curios.imaginary_infection]
		#每层虚数侵染的增伤比例 (默认: 0.1 = 10%/层)
		#Range: 0.01 ~ 1.0
		ampPerLevel = 0.1
		#虚数侵染效果最大等级上限 (默认: 99)
		#Range: 1 ~ 99
		maxLevel = 99
		#虚数侵染效果持续时间(秒) (默认: 15)
		#Range: 1 ~ 300
		duration = 15
		#虚数侵染降低的虚数抗性值 (默认: 10)
		#Range: 0.0 ~ 100.0
		resistanceReduction = 10.0
		#每点虚数抗性提高的伤害保留比例 (默认: 0.01 = 1%/点)
		#Range: 0.0 ~ 1.0
		damageResistanceBonusPerPoint = 0.01

	#虚数崩解配置（虚数崩解基于虚数侵染层数和负面效果种数造成额外伤害）
	[tcc_curios.imaginary_collapse]
		#每层虚数侵染的崩解增伤比例 (默认: 0.05 = 5%/层)
		#Range: 0.0 ~ 1.0
		percentPerLevel = 0.05
		#每种负面效果的崩解增伤比例 (默认: 0.1 = 10%/种)
		#Range: 0.0 ~ 1.0
		percentPerDebuff = 0.1
		#崩解计入的负面效果种数上限 (默认: 5)
		#Range: 1 ~ 20
		maxDebuffCount = 5

	#按饰品分级的虚数侵染上限（当攻击者携带对应饰品时，目标虚数侵染不会超过此等级）
	[tcc_curios.imaginary_infection_per_curio]
		#天火圣裁的虚数侵染上限 (默认: 3)
		#Range: 1 ~ 99
		judgmentMaxLevel = 3
		#天火劫灭的虚数侵染上限 (默认: 6)
		#Range: 1 ~ 99
		apocalypseMaxLevel = 6
		#劫灭无尽的虚数侵染上限 (默认: 9)
		#Range: 1 ~ 99
		endlessMaxLevel = 9

	#天火劫灭饰品配置
	[tcc_curios.heaven_fire_apocalypse]
		#通用枪械伤害加成 (默认: 10.0 = 1000%)
