		#伤害降低90%，并转换为虚数伤害
		#Range: 0.0 ~ 1.0
		damageConversionRatio = 0.01
		#天火劫灭生效的枪械类型列表 (可选: pistol, rifle, shotgun, sniper, smg, mg, rpg)
		gunTypes = ["pistol"]

