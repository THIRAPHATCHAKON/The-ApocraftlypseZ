
["枪械伤害计算设置"]
	#枪械伤害计算模式
	#MAX: 通用与特定取最大值
	#ADDITIVE: 通用+特定-1
	#MULTIPLICATIVE: 通用*特定
	#Allowed Values: MAX, ADDITIVE, MULTIPLICATIVE
	damageCalculationMode = "ADDITIVE"

["暴击属性显示设置"]
	#暴击率属性完整ID（格式：命名空间:属性名）
	#默认: attributeslib:crit_chance
	#示例: last_one:crit_chance
	critChanceAttribute = "attributeslib:crit_chance"
	#暴击伤害属性完整ID（格式：命名空间:属性名）
	#默认: attributeslib:crit_damage
	#示例: last_one:crit_damage
	critDamageAttribute = "attributeslib:crit_damage"

["多语言显示设置"]
	#显示语言选择
	#ZH: 中文
	#EN: 英文
	#Allowed Values: ZH, EN
	displayLanguage = "ZH"
	#暴击率显示名称（中文）
	critChanceNameZh = "暴击率"
	#暴击伤害显示名称（中文）
	critDamageNameZh = "暴击伤害"
	#暴击率显示名称（英文）
	critChanceNameEn = "Critical Chance"
	#暴击伤害显示名称（英文）
	critDamageNameEn = "Critical Damage"

